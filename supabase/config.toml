
[functions.notify-on-response]
enabled = true
verify_jwt = false
import_map = "./functions/notify-on-response/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-on-response/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-on-response/*.html" ]

[functions.notify-on-new-post]
enabled = true
verify_jwt = false
import_map = "./functions/notify-on-new-post/deno.json"
entrypoint = "./functions/notify-on-new-post/index.ts"
